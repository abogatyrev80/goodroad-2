apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: road-monitor
  labels:
    app: backend
data:
  MONGO_URL: "mongodb://mongodb:27017"
  MONGO_DB_NAME: "road_monitor"
  LOG_LEVEL: "INFO"
  DEBUG: "False"
  CLUSTER_RADIUS: "1.0"
  NEURAL_MODEL_PATH: "/app/models/accel_lstm.pt"
  NEURAL_MIN_CONFIDENCE: "0.35"
  CORS_ORIGINS: "https://goodroad.su,https://api.goodroad.su"
  RATE_LIMIT_REQUESTS: "30"
  RATE_LIMIT_WINDOW: "60"
  # Inference Worker
  NN_INFERENCE_INTERVAL: "30"
  NN_INFERENCE_BATCH_SIZE: "50"
  # Auto Trainer
  NN_RETRAIN_THRESHOLD: "1000"
  NN_MIN_SAMPLES_PER_CLASS: "100"
  NN_RETRAIN_CHECK_INTERVAL: "300"
  NN_MODEL_VERSIONING: "true"
  # External Training (GPU Server)
  EXTERNAL_TRAINING_ENABLED: "false"
  EXTERNAL_TRAINING_API_KEY: ""
  EXTERNAL_TRAINING_WEBHOOK_SECRET: ""
  EXTERNAL_TRAINING_GPU_SERVER_URL: ""
  EXTERNAL_TRAINING_TIMEOUT: "3600"
  EXTERNAL_TRAINING_DATASET_TTL: "24"