name: Build & Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy (short or full). Leave empty to build & deploy HEAD."
        required: false
        default: ""

env:
  IMAGE: abogatyrev80/goodroad

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    # Skip build when rolling back to an existing image
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.sha == ''
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve short SHA
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    # Run after build (normal push) or directly (rollback dispatch)
    if: always() && (needs.build.result == 'success' || (github.event_name == 'workflow_dispatch' && github.event.inputs.sha != ''))
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target SHA
        id: target
        run: |
          if [ -n "${{ github.event.inputs.sha }}" ]; then
            echo "sha=${{ github.event.inputs.sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ needs.build.outputs.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            SHA="${{ steps.target.outputs.sha }}"
            IMAGE="${{ env.IMAGE }}"

            echo "Deploying $IMAGE:$SHA"

            docker pull "$IMAGE:$SHA"

            sed -i "s|image: $IMAGE:.*|image: $IMAGE:$SHA|" /opt/goodroad/docker-compose.yaml

            cd /opt/goodroad
            docker compose up -d --no-deps --wait backend

            echo "Done. Running image: $(docker inspect road-monitor-backend --format '{{.Config.Image}}')"
